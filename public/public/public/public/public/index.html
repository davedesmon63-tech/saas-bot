DOCTYPE html>
<html>
<head>
  <title>Vorax AI Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    #response {
      margin-top: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>🤖 Vorax AI</h1>

<input id="msg" placeholder="Écris ton message..." />
<br>
<button onclick="send()">Envoyer</button>

<p id="response"></p>

<script>
async function send() {
  const message = document.getElementById("msg").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  document.getElementById("response").innerText = data.reply;
}
</script>

</body>
</html>
