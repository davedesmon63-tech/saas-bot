<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vorax SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #22c55e;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
  gap: 20px;
}

.card {
  width: 320px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.chatBox {
  height: 200px;
  overflow-y: auto;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.msg {
  padding: 6px 10px;
  margin: 5px 0;
  border-radius: 8px;
}

.user {
  background: #22c55e;
  color: black;
  text-align: right;
}

.bot {
  background: #1f2937;
}

.output {
  font-size: 14px;
  color: #d1d5db;
  margin-top: 10px;
}

.premium {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<div class="header">🚀 VORAX SAAS</div>

<div class="container">

<!-- LOGIN -->
<div class="card">
  <h3>🔐 Login</h3>

  <input id="userId" placeholder="User ID">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <div id="authMsg" class="output"></div>
</div>

<!-- IDEES -->
<div class="card">
  <h3>💡 Idées Business</h3>

  <button onclick="getIdea()">Générer idée</button>

  <div id="ideaBox" class="output"></div>
</div>

<!-- CHAT -->
<div class="card">
  <h3>💬 Chat AI</h3>

  <div id="chatBox" class="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<!-- 💰 MONETISATION -->
<div class="card premium">
  <h3>💰 Premium</h3>

  <button onclick="upgrade()">Activer Premium</button>

  <input id="vipCode" placeholder="Code VIP (VORAX-PRO-2026)">
  <button onclick="vip()">Valider Code</button>

  <div id="premiumMsg" class="output"></div>
</div>

</div>

<script>
let token = "";

/* REGISTER */
async function register() {
  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: userId.value,
      password: password.value
    })
  });

  authMsg.innerText = JSON.stringify(await res.json());
}

/* LOGIN */
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: userId.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.userId) {
    token = data.userId; // simple (ton backend utilise userId)
  }

  authMsg.innerText = data.pro ? "🔥 PREMIUM ACTIF" : "🟢 FREE ACTIF";
}

/* IDEE */
async function getIdea() {
  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: userId.value,
      message: "business"
    })
  });

  const data = await res.json();
  ideaBox.innerText = data.reply;
}

/* CHAT */
async function sendMessage() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  add(msg, "user");

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: userId.value,
      message: msg
    })
  });

  const data = await res.json();

  add(data.reply, "bot");

  msg.value = "";
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* 💰 UPGRADE PREMIUM */
async function upgrade() {
  const res = await fetch("/upgrade", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ userId: userId.value })
  });

  const data = await res.json();
  premiumMsg.innerText = data.message || data.error;
}

/* 💳 VIP CODE */
async function vip() {
  const res = await fetch("/vip", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: userId.value,
      code: vipCode.value
    })
  });

  const data = await res.json();
  premiumMsg.innerText = data.message || data.error;
}
</script>

</body>
</html>
