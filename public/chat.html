<!DOCTYPE html>
<html>
<head>
  <title>Vorax AI Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      background: #00ffcc;
      border: none;
      font-weight: bold;
    }

    #response {
      margin-top: 20px;
      color: #00ffcc;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>🤖 Vorax AI Chat</h1>

<input id="msg" placeholder="Écris ton message..." />
<br>

<button onclick="send()">Envoyer</button>

<p id="response"></p>

<script>
async function send() {
  const message = document.getElementById("msg").value;

  if (!message || message.trim() === "") return;

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: message,
      userId: localStorage.getItem("userId") || "guest"
    })
  });

  const data = await res.json();

  document.getElementById("response").innerText = data.reply;
}
</script>

</body>
</html>
