<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORAX Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  background: #0a0a0a;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #111;
  padding: 15px;
  border-bottom: 2px solid #00ff88;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header h1 {
  color: #00ff88;
  font-size: 18px;
}

.header button {
  background: #ff4444;
  border: none;
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 75%;
  padding: 12px 15px;
  border-radius: 12px;
  line-height: 1.4;
  word-wrap: break-word;
}

.user {
  background: #00ff88;
  color: #000;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.ai {
  background: #1a1a1a;
  border: 1px solid #333;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.input-area {
  display: flex;
  padding: 15px;
  background: #111;
  border-top: 1px solid #333;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #0a0a0a;
  color: #fff;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 12px 20px;
  background: #00ff88;
  border: none;
  color: #000;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

.input-area button:disabled {
  background: #555;
  cursor: not-allowed;
}

.typing {
  font-style: italic;
  color: #888;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🤖 VORAX AI</h1>
  <button onclick="logout()">Déconnexion</button>
</div>

<div class="chat-box" id="chatBox">
  <div class="msg ai">Salut 👋 Je suis VORAX. Pose-moi ta question !</div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Écris ton message..." onkeypress="if(event.key==='Enter') sendMsg()">
  <button id="sendBtn" onclick="sendMsg()">Envoyer</button>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// Vérifier si user connecté
const token = localStorage.getItem('token');
if(!token) window.location.href = '/login.html';

function addMsg(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.textContent = 'VORAX écrit...';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMsg() {
  const msg = userInput.value.trim();
  if(!msg) return;
  
  addMsg(msg, 'user');
  userInput.value = '';
  sendBtn.disabled = true;
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    removeTyping();
    
    if(res.ok) {
      addMsg(data.reply, 'ai');
    } else {
      addMsg('Erreur: ' + data.error, 'ai');
    }
  } catch(e) {
    removeTyping();
    addMsg('Erreur de connexion', 'ai');
  }
  
  sendBtn.disabled = false;
}

function logout() {
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}
</script>

</body>
</html>
