<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dashboard Vorax</title>
<style>body{background:#0a0a0a;color:#fff;padding:20px}.card{background:#1a1a1a;padding:20px;margin:15px 0;border-radius:10px;border-left:3px solid #00ff88}.btn{background:#00ff88;color:#000;padding:12px 25px;border:none;border-radius:5px;cursor:pointer;font-weight:bold}#footer{margin-top:40px;text-align:center;font-size:12px;color:#555}</style>
</head><body>
<h1>Dashboard Vorax</h1>
<div id="userInfo" class="card"></div>
<div class="card">
<h3>Premium 2000 FCFA/mois</h3>
<p>✓ Génération illimitée<br>✓ Export PDF<br>✓ Secteurs niche exclusifs</p>
<button class="btn" onclick="pay()">Activer Premium 2000 FCFA</button>
</div>
<div class="card">
<button class="btn" onclick="location.href='/chat'">🧠 Générer une idée maintenant</button>
</div>
<div id="footer"></div>
<script>
const userId=localStorage.getItem('userId');
if(!userId) location.href='/login';
fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,password:localStorage.getItem('pass')})})
.then(r=>r.json()).then(u=>userInfo.innerHTML=`<h3>Bonjour ${u.userId}</h3><p>Plan actuel: <b>${u.plan}</b><br>Expire le: ${u.expires?new Date(u.expires).toLocaleDateString():'N/A'}</p>`);

async function pay(){
const res=await fetch('/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId})});
const data=await res.json(); 
if(data.url) location.href=data.url; else alert(data.error);
}
fetch('/api/footer').then(r=>r.json()).then(d=>footer.innerText=d.text)
</script></body></html>
