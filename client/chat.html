<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Chat Vorax IA</title>
<style>body{background:#0a0a0a;color:#fff;padding:20px;max-width:800px;margin:auto}textarea{width:100%;height:120px;background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px;border-radius:5px;font-size:14px}.btn{background:#00ff88;color:#000;padding:12px 25px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin-top:10px}#result{background:#1a1a1a;padding:20px;margin-top:20px;border-radius:10px;white-space:pre-wrap;border-left:3px solid #00ff88}</style>
</head><body>
<h2>🧠 Générateur d’idées Vorax</h2>
<p>Décris ton budget, secteur, pays... L’IA te sort une idée complète</p>
<textarea id="prompt" placeholder="Ex: Je suis à Abidjan, budget 50k FCFA, je veux vendre en ligne sans stock..."></textarea>
<button class="btn" onclick="generer()">Générer mon idée</button>
<div id="result"></div>
<script>
async function generer(){
const promptText=prompt.value;
if(!promptText) return alert('Décris ton projet');
result.innerText='⏳ Génération en cours...';
const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:promptText,userId:localStorage.getItem('userId')})});
const data=await res.json(); 
result.innerText=data.error || data.idea || 'Erreur';
}
</script></body></html>
